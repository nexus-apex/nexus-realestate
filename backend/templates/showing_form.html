{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Showing | NexusRealEstate{% endblock %}
{% block page_title %}{% if editing %}Edit Showing{% else %}New Showing{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Property Title</label>
        <input type="text" name="property_title" value="{{ record.property_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" name="client_name" value="{{ record.client_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Agent</label>
        <input type="text" name="agent" value="{{ record.agent|default:'' }}">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Time Slot</label>
        <input type="text" name="time_slot" value="{{ record.time_slot|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="scheduled" {% if record.status == 'scheduled' %}selected{% endif %}>Scheduled</option>
          <option value="completed" {% if record.status == 'completed' %}selected{% endif %}>Completed</option>
          <option value="cancelled" {% if record.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          <option value="no_show" {% if record.status == 'no_show' %}selected{% endif %}>No Show</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Feedback</label>
      <textarea name="feedback">{{ record.feedback|default:'' }}</textarea>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Showing</button>
      <a href="/showings/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
