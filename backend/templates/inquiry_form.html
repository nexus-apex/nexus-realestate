{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Inquiry | NexusRealEstate{% endblock %}
{% block page_title %}{% if editing %}Edit Inquiry{% else %}New Inquiry{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Client Name</label>
        <input type="text" name="client_name" value="{{ record.client_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Client Phone</label>
        <input type="text" name="client_phone" value="{{ record.client_phone|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Client Email</label>
        <input type="email" name="client_email" value="{{ record.client_email|default:'' }}">
      </div>
      <div class="form-group">
        <label>Property Title</label>
        <input type="text" name="property_title" value="{{ record.property_title|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Inquiry Type</label>
        <select name="inquiry_type">
          <option value="buy" {% if record.inquiry_type == 'buy' %}selected{% endif %}>Buy</option>
          <option value="rent" {% if record.inquiry_type == 'rent' %}selected{% endif %}>Rent</option>
          <option value="invest" {% if record.inquiry_type == 'invest' %}selected{% endif %}>Invest</option>
        </select>
      </div>
      <div class="form-group">
        <label>Budget</label>
        <input type="number" step="0.01" name="budget" value="{{ record.budget|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="new" {% if record.status == 'new' %}selected{% endif %}>New</option>
          <option value="contacted" {% if record.status == 'contacted' %}selected{% endif %}>Contacted</option>
          <option value="site_visit" {% if record.status == 'site_visit' %}selected{% endif %}>Site Visit</option>
          <option value="negotiation" {% if record.status == 'negotiation' %}selected{% endif %}>Negotiation</option>
          <option value="closed" {% if record.status == 'closed' %}selected{% endif %}>Closed</option>
        </select>
      </div>
      <div class="form-group">
        <label>Source</label>
        <select name="source">
          <option value="website" {% if record.source == 'website' %}selected{% endif %}>Website</option>
          <option value="walk_in" {% if record.source == 'walk_in' %}selected{% endif %}>Walk In</option>
          <option value="referral" {% if record.source == 'referral' %}selected{% endif %}>Referral</option>
          <option value="portal" {% if record.source == 'portal' %}selected{% endif %}>Portal</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Inquiry</button>
      <a href="/inquiries/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
